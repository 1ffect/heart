<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Luxury - 3D Particle Heart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap');
        
        :root {
            --silver: #C0C0C0;
            --silver-dark: #808080;
            --red-dark: #8B0000;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(192, 192, 192, 0.4);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Cinzel', 'Noto Serif SC', serif; color: white; user-select: none; }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Loading Screen */
        #loader { position: absolute; z-index: 100; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease; }
        .spinner { width: 50px; height: 50px; border: 3px solid transparent; border-top-color: var(--silver); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* UI Elements - Glassmorphism */
        .glass-panel { position: absolute; z-index: 10; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); transition: opacity 0.3s; }
        
        /* Controls Layout */
        #media-controls { bottom: 30px; left: 30px; display: flex; gap: 15px; }
        #top-controls { top: 30px; right: 30px; display: flex; gap: 15px; }
        #param-controls { top: 30px; left: 30px; width: 280px; }
        
        button { background: rgba(255, 255, 255, 0.05); color: var(--silver); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 8px; font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.3s ease; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        button:hover { background: rgba(192, 192, 192, 0.2); border-color: var(--silver); color: #fff; box-shadow: 0 0 15px rgba(192, 192, 192, 0.3); }

        /* Camera Preview */
        #cam-preview-container { position: absolute; bottom: 30px; right: 30px; width: 200px; height: 150px; z-index: 10; border: 2px solid var(--silver); border-radius: 12px; overflow: hidden; box-shadow: 0 0 20px rgba(192, 192, 192, 0.2); }
        #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .status-dot { position: absolute; top: 10px; right: 10px; width: 10px; height: 10px; background-color: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; animation: pulse 2s infinite; }
        #cam-status { position: absolute; left: 8px; bottom: 8px; font-size: 11px; line-height: 1.2; padding: 3px 6px; border-radius: 999px; background: rgba(0,0,0,0.55); color: #ffd166; border: 1px solid rgba(255,255,255,0.25); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Photo Manager Modal */
        #photo-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 800px; max-height: 80vh; z-index: 50; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 15px; }
        #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .photo-item { position: relative; aspect-ratio: 1; border: 2px solid var(--silver); border-radius: 8px; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(139, 0, 0, 0.8); color: white; border: 1px solid white; border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; }

        /* Draggable Texts */
        .custom-text { position: absolute; z-index: 20; color: white; text-shadow: 0 0 20px rgba(192,192,192,0.8), 0 0 40px rgba(255,255,255,0.4); cursor: move; padding: 10px; border: 1px dashed transparent; }
        .custom-text:hover, .custom-text:focus { border-color: var(--glass-border); background: rgba(255,255,255,0.05); outline: none; }
        #title-1 { top: 20%; left: 50%; transform: translateX(-50%); font-size: 3rem; }
        #title-2 { top: 30%; left: 50%; transform: translateX(-50%); font-size: 1.5rem; letter-spacing: 5px; color: var(--silver); }
        :fullscreen .custom-text, :-webkit-full-screen .custom-text { opacity: 1 !important; visibility: visible !important; z-index: 30; }

        /* Sliders */
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--silver); }
        input[type="range"] { width: 100%; accent-color: var(--silver); background: rgba(255,255,255,0.1); }
        select, input[type="color"] { background: transparent; color: white; border: 1px solid var(--silver); border-radius: 4px; padding: 2px; }

        input[type="file"] { display: none; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- MediaPipe is loaded dynamically from ESM to avoid stale/404 bundle URLs. -->
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">初始化系统... (加载AI模型与渲染引擎)</div>
    </div>

    <div id="canvas-container"></div>

    <div id="title-1" class="custom-text" contenteditable="true" spellcheck="false">Eternal Love</div>
    <div id="title-2" class="custom-text" contenteditable="true" spellcheck="false">All goes as you wish</div>

    <div id="param-controls" class="glass-panel">
        <div style="font-size: 16px; margin-bottom: 15px; text-align: center; border-bottom: 1px solid var(--silver); padding-bottom: 5px;">参数控制中心</div>
        <div class="control-group">
            <label>旋转速度</label>
            <input type="range" id="ctrl-speed" min="0" max="0.05" step="0.001" value="0.01">
        </div>
        <div class="control-group">
            <label>粒子树密度 (需重启生效)</label>
            <input type="range" id="ctrl-density" min="1000" max="10000" step="500" value="4000">
        </div>
        <div class="control-group">
            <label>字体样式</label>
            <select id="ctrl-font">
                <option value="'Cinzel', serif">Cinzel (古典)</option>
                <option value="'Noto Serif SC', serif">Noto Serif (衬线)</option>
                <option value="Arial, sans-serif">Arial (现代)</option>
                <option value="'Courier New', monospace">Courier (代码)</option>
                <option value="Impact, sans-serif">Impact (厚重)</option>
            </select>
        </div>
        <div class="control-group" style="display:flex; justify-content:space-between; align-items:center;">
            <label style="margin:0;">标题颜色</label>
            <input type="color" id="ctrl-color" value="#ffffff">
        </div>
        <div style="font-size:10px; color:gray; margin-top:10px;">提示: 拖拽文字可移动位置</div>
    </div>

    <div id="media-controls" class="glass-panel">
        <button onclick="document.getElementById('upload-photo').click()">添加照片</button>
        <input type="file" id="upload-photo" accept="image/*" multiple>
        
        <button id="btn-manage-photos">管理照片</button>
        
        <button onclick="document.getElementById('upload-music').click()">添加音乐</button>
        <input type="file" id="upload-music" accept="audio/*">
        
        <button id="btn-play-music" style="display: none;">播放音乐 ▶</button>
    </div>

    <div id="top-controls" class="glass-panel" style="padding: 10px;">
        <button id="btn-fullscreen">全屏显示</button>
        <button id="btn-toggle-ui">隐藏界面</button>
    </div>

    <div id="cam-preview-container">
        <div class="status-dot"></div>
        <video id="cam-video" autoplay playsinline muted></video>
        <div id="cam-status">AI: 初始化中</div>
    </div>

    <div id="photo-modal" class="glass-panel">
        <div class="modal-header">
            <span style="font-size: 1.2rem; color: var(--silver);">照片记忆库</span>
            <button id="btn-close-modal" style="padding: 5px 10px;">关闭 X</button>
        </div>
        <div id="photo-grid"></div>
    </div>

    <audio id="bg-audio" loop></audio>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        let FilesetResolver = window.vision?.FilesetResolver || null;
        let HandLandmarker = window.vision?.HandLandmarker || null;

        const ensureVisionApisLoaded = async () => {
            if (FilesetResolver && HandLandmarker) return;

            const moduleUrls = [
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs",
                "https://unpkg.com/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
            ];

            let lastErr;
            for (const url of moduleUrls) {
                try {
                    const mod = await import(url);
                    FilesetResolver = mod.FilesetResolver || mod.vision?.FilesetResolver || window.vision?.FilesetResolver || null;
                    HandLandmarker = mod.HandLandmarker || mod.vision?.HandLandmarker || window.vision?.HandLandmarker || null;
                    if (FilesetResolver && HandLandmarker) return;
                } catch (err) {
                    lastErr = err;
                    console.warn(`MediaPipe module load failed: ${url}`, err);
                }
            }

            throw new Error(`MediaPipe vision bundle not loaded: ${lastErr?.message || 'network error'}`);
        };

        const resolveVisionFileset = async () => {
            const wasmBaseUrls = [
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm",
                "https://unpkg.com/@mediapipe/tasks-vision@0.10.3/wasm"
            ];

            let lastErr;
            for (const wasmBaseUrl of wasmBaseUrls) {
                try {
                    return await FilesetResolver.forVisionTasks(wasmBaseUrl);
                } catch (err) {
                    lastErr = err;
                    console.warn(`MediaPipe WASM base failed: ${wasmBaseUrl}`, err);
                }
            }

            throw new Error(`MediaPipe WASM load failed: ${lastErr?.message || 'network error'}`);
        };

        // ==========================================
        // 1. IndexedDB Wrapper for Local Storage
        // ==========================================
        const DB_NAME = 'LuxuryHeartDB';
        const STORE_NAME = 'photos';
        let db;

        const initDB = () => new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = (e) => reject(e);
        });

        const savePhotoToDB = async (id, dataUrl) => {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put({ id, dataUrl });
                tx.oncomplete = () => resolve();
            });
        };

        const loadPhotosFromDB = async () => {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const request = tx.objectStore(STORE_NAME).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const deletePhotoFromDB = async (id) => {
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(id);
                tx.oncomplete = () => resolve();
            });
        };

        // ==========================================
        // 2. State & Settings
        // ==========================================
        const state = {
            mode: 'TREE', // 'TREE', 'SCATTER', 'FOCUS'
            targetMode: 'TREE',
            focusMesh: null,
            focusOriginalPos: new THREE.Vector3(),
            focusOriginalQuat: new THREE.Quaternion(),
            rotationSpeed: 0.01,
            manualRotation: { x: 0, y: 0 },
            handRotation: { x: 0, y: 0 },
            handRotationTarget: { x: 0, y: 0 },
            pinchReleaseCountdown: 0,
            modeSwitchCooldown: 0,
            resetGestureCooldown: 0,
            scatterReadiness: 0,
            lastGrabbedPhotoId: null,
            grabRoundRemainingIds: [],
            photos: [], // Array of objects {id, mesh, dataUrl}
            uiVisible: true,
            isPinching: false,
            pinchReady: true,
            pinchReleaseFrames: 0
        };

        const CONFIG = {
            particleCount: 4000,
            dustCount: 2000
        };

        const INTERACTION_CONFIG = {
            centerGrabNdcRadius: 0.24,
            pinchFallbackNdcRadius: 1.05,
            scatterAutoSpinY: 0.006,
            scatterAutoSpinX: 0.0018,
            scatterAutoSpinZ: 0.0015,
            treeAutoSpinY: 0.0018,
            handControlGain: 0.22,
            handControlDeadZone: 0.15,
            handControlMax: 0.00065,
            handControlSmoothing: 0.11,
            photoFollowDeadZone: 0.10,
            photoFollowRangeX: 4.2,
            photoFollowRangeY: 2.6,
            photoFollowBaseDistance: 16.2,
            photoFollowForwardRange: 4.8,
            photoFollowScaleBase: 2.8,
            photoFollowScaleBoost: 0.62,
            photoFollowLerp: 0.24,
            photoFollowCenterPullMax: 0.70,
            photoFollowScaleMax: 3.6,
            focusMinDistance: 12.5,
            focusMaxDistance: 18.5,
            focusSafeMargin: 0.14,
            pinchReleaseGraceFrames: 16,
            pinchHoldStrengthMin: 0.05,
            pinchRearmReleaseFrames: 5,
            pinchEnableScatterThreshold: 0.62
        };

        const STANDARD_HEART = {
            scaleX: 8.2,
            scaleY: 7.8,
            scaleZ: 6.8,
            shellBias: 0.78,
            shellThreshold: 0.036,
            jitter: 0.065
        };

        // ==========================================
        // 3. UI Interactions & Dragging
        // ==========================================
        const makeDraggable = (el) => {
            let isDown = false, startX, startY, initX, initY;
            el.addEventListener('mousedown', (e) => {
                if(e.target !== el) return;
                isDown = true;
                startX = e.clientX; startY = e.clientY;
                const rect = el.getBoundingClientRect();
                initX = rect.left; initY = rect.top;
                el.style.transform = 'none'; // Clear transform to use raw Top/Left
                el.style.left = initX + 'px'; el.style.top = initY + 'px';
            });
            window.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const dx = e.clientX - startX; const dy = e.clientY - startY;
                el.style.left = (initX + dx) + 'px'; el.style.top = (initY + dy) + 'px';
            });
            window.addEventListener('mouseup', () => { isDown = false; });
        };
        makeDraggable(document.getElementById('title-1'));
        makeDraggable(document.getElementById('title-2'));

        const ensureTitlesVisible = () => {
            document.querySelectorAll('.custom-text').forEach((el) => {
                el.style.opacity = '1';
                el.style.visibility = 'visible';
                el.style.display = 'block';
            });
        };

        const setUiVisible = (visible) => {
            state.uiVisible = visible;
            const els = document.querySelectorAll('.glass-panel, #cam-preview-container');
            els.forEach(el => el.style.opacity = state.uiVisible ? '1' : '0');
            ensureTitlesVisible();
        };

        const isFullscreenActive = () => !!(document.fullscreenElement || document.webkitFullscreenElement);

        const requestAppFullscreen = () => {
            const el = document.documentElement;
            if (el.requestFullscreen) return el.requestFullscreen();
            if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
            return Promise.resolve();
        };

        const exitAppFullscreen = () => {
            if (document.exitFullscreen) return document.exitFullscreen();
            if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
            return Promise.resolve();
        };

        const enterFullscreenAndHideUi = () => {
            setUiVisible(false);
            if (!isFullscreenActive()) {
                requestAppFullscreen().catch(() => {});
            }
        };

        document.getElementById('btn-toggle-ui').addEventListener('click', () => {
            setUiVisible(!state.uiVisible);
        });

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!isFullscreenActive()) requestAppFullscreen().catch(() => {});
            else exitAppFullscreen().catch(() => {});
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) ensureTitlesVisible();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (document.fullscreenElement || document.webkitFullscreenElement) ensureTitlesVisible();
        });

        document.getElementById('ctrl-speed').addEventListener('input', (e) => state.rotationSpeed = parseFloat(e.target.value));
        document.getElementById('ctrl-font').addEventListener('change', (e) => {
            document.getElementById('title-1').style.fontFamily = e.target.value;
            document.getElementById('title-2').style.fontFamily = e.target.value;
        });
        document.getElementById('ctrl-color').addEventListener('input', (e) => {
            document.getElementById('title-1').style.color = e.target.value;
        });

        // ==========================================
        // 4. Three.js Setup & Post-processing
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Environment for metallic reflections
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // Post-processing: UnrealBloomPass for Grand Luxury glow
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.5, 0.7);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 5, 100);
        pointLight.position.set(0, 0, 10);
        scene.add(pointLight);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 5. Particle Systems Generation
        // ==========================================
        const coreGroup = new THREE.Group();
        scene.add(coreGroup);

        // Dust background
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(CONFIG.dustCount * 3);
        for(let i=0; i<CONFIG.dustCount * 3; i++) dustPos[i] = (Math.random() - 0.5) * 150;
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5 });
        const dustSystem = new THREE.Points(dustGeo, dustMat);
        scene.add(dustSystem);

        const shapeStandardHeartPoint = (x, y, z) => {
            const yNorm = THREE.MathUtils.clamp((y + 1.35) / 2.7, 0, 1);
            const centerArc = 1 - Math.pow(2 * yNorm - 1, 2);
            const bottomBias = Math.pow(1 - yNorm, 1.6);
            const topBias = Math.pow(yNorm, 1.3);

            // Smoothly expand volume for a fuller side profile while keeping a standard front silhouette.
            x *= 1.08 + centerArc * 0.08 + topBias * 0.04;
            z *= 1.14 + centerArc * 0.14 + bottomBias * 0.18;
            y -= bottomBias * 0.20;

            return new THREE.Vector3(
                x * STANDARD_HEART.scaleX,
                y * STANDARD_HEART.scaleY,
                z * STANDARD_HEART.scaleZ
            );
        };

        // Classic implicit 3D heart: ((x^2 + y^2 + 9/4 z^2 - 1)^3 - x^2 y^3 - 9/80 z^2 y^3 <= 0)
        const buildHeartPointPool = (targetCount) => {
            const points = [];
            let attempts = 0;
            const maxAttempts = targetCount * 120;

            while (points.length < targetCount && attempts < maxAttempts) {
                attempts += 1;

                const x = (Math.random() * 2 - 1) * 1.25;
                const y = (Math.random() * 2 - 1) * 1.35;
                const z = (Math.random() * 2 - 1) * 1.0;

                const q = x * x + y * y + (9 / 4) * z * z - 1;
                const f = q * q * q - x * x * y * y * y - (9 / 80) * z * z * y * y * y;
                if (f > 0) continue;

                if (Math.random() < STANDARD_HEART.shellBias && Math.abs(f) > STANDARD_HEART.shellThreshold) continue;

                points.push(shapeStandardHeartPoint(x, y, z));
            }

            if (points.length === 0) {
                points.push(new THREE.Vector3(0, 0, 0));
            }

            return points;
        };

        const heartPointPool = buildHeartPointPool(Math.max(CONFIG.particleCount * 2, 9000));
        const sampleHeartVolumePoint = () => {
            const base = heartPointPool[Math.floor(Math.random() * heartPointPool.length)];
            const jitter = STANDARD_HEART.jitter;
            return base.clone().add(new THREE.Vector3(
                (Math.random() - 0.5) * jitter,
                (Math.random() - 0.5) * jitter,
                (Math.random() - 0.5) * jitter
            ));
        };

        const sampleNebulaPoint = (scale = 1) => {
            // Volumetric nebula: spherical base + swirl + turbulent pockets.
            const radius = 8 + Math.pow(Math.random(), 0.72) * 38;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const swirl = radius * 0.22;

            const base = new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta + swirl),
                radius * Math.cos(phi) * 0.9,
                radius * Math.sin(phi) * Math.sin(theta + swirl)
            );

            const pocketSign = Math.random() < 0.5 ? -1 : 1;
            const pocketOffset = new THREE.Vector3(
                pocketSign * (4 + Math.random() * 3),
                (Math.random() - 0.5) * 6,
                -pocketSign * (3 + Math.random() * 3)
            );

            const turbulence = new THREE.Vector3(
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 8
            );

            return base.addScaledVector(pocketOffset, 0.55).add(turbulence).multiplyScalar(scale);
        };

        // Main Instanced Particles (Spheres, Cubes, Tubes)
        const geoms = [
            new THREE.SphereGeometry(0.2, 8, 8),
            new THREE.BoxGeometry(0.3, 0.3, 0.3),
            new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8)
        ];
        // Luxury Materials
        const mats = [
            new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 }), // Silver
            new THREE.MeshStandardMaterial({ color: 0x8B0000, metalness: 0.5, roughness: 0.1, emissive: 0x330000 }), // Dark Red
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x555555 }) // White Glow
        ];

        let instancedMeshes = [];
        const particlesData = []; // Store targets

        for(let i=0; i<3; i++) {
            const count = Math.floor(CONFIG.particleCount / 3);
            const mesh = new THREE.InstancedMesh(geoms[i], mats[i], count);
            const dummy = new THREE.Object3D();
            
            for(let j=0; j<count; j++) {
                // Generate standard 3D heart position (TREE)
                const posTree = sampleHeartVolumePoint();

                // Generate Scatter Position (true volumetric nebula)
                const posScatter = sampleNebulaPoint(1.0);

                particlesData.push({
                    meshIndex: i,
                    instanceId: j,
                    treePos: posTree,
                    scatterPos: posScatter,
                    currentPos: posTree.clone()
                });

                dummy.position.copy(posTree);
                dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                dummy.updateMatrix();
                mesh.setMatrixAt(j, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;
            coreGroup.add(mesh);
            instancedMeshes.push(mesh);
        }

        // ==========================================
        // 6. Photo Management (3D & UI)
        // ==========================================
        const texLoader = new THREE.TextureLoader();
        const silverFrameMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, metalness: 1.0, roughness: 0.1 });
        
        const createPhotoMesh = (dataUrl, id) => {
            const img = new Image();
            img.src = dataUrl;
            img.onload = () => {
                const aspect = img.width / img.height;
                const w = 4 * aspect;
                const h = 4;
                
                const frameGeo = new THREE.BoxGeometry(w + 0.4, h + 0.4, 0.2);
                const frame = new THREE.Mesh(frameGeo, silverFrameMat);
                
                const tex = texLoader.load(dataUrl);
                tex.colorSpace = THREE.SRGBColorSpace;
                const picGeo = new THREE.PlaneGeometry(w, h);
                const picMat = new THREE.MeshBasicMaterial({ map: tex });
                const pic = new THREE.Mesh(picGeo, picMat);
                pic.position.z = 0.11;
                frame.add(pic);

                // Assign positions
                const treePos = sampleHeartVolumePoint().multiplyScalar(1.2);
                const scatterPos = sampleNebulaPoint(0.95);

                frame.position.copy(treePos);
                frame.visible = false;
                frame.userData = { id, treePos, scatterPos, currentPos: treePos.clone(), isFocused: false };
                
                coreGroup.add(frame);
                state.photos.push({ id, mesh: frame, dataUrl });
                state.grabRoundRemainingIds = [];
                updatePhotoVisibility();
                renderPhotoGrid();
            };
        };

        document.getElementById('upload-photo').addEventListener('change', async (e) => {
            const files = e.target.files;
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const dataUrl = event.target.result;
                    const id = Date.now().toString() + Math.random().toString().slice(2, 6);
                    await savePhotoToDB(id, dataUrl);
                    createPhotoMesh(dataUrl, id);
                };
                reader.readAsDataURL(file);
            }
        });

        // Photo UI Manager
        const photoModal = document.getElementById('photo-modal');
        document.getElementById('btn-manage-photos').addEventListener('click', () => photoModal.style.display = 'block');
        document.getElementById('btn-close-modal').addEventListener('click', () => photoModal.style.display = 'none');

        const renderPhotoGrid = () => {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            state.photos.forEach(photo => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                div.innerHTML = `
                    <img src="${photo.dataUrl}" alt="Memory">
                    <div class="delete-btn" data-id="${photo.id}">X</div>
                `;
                grid.appendChild(div);
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    await deletePhotoFromDB(id);
                    const index = state.photos.findIndex(p => p.id === id);
                    if(index > -1) {
                        if (state.focusMesh === state.photos[index].mesh) {
                            state.focusMesh = null;
                        }
                        const removedId = state.photos[index].id;
                        coreGroup.remove(state.photos[index].mesh);
                        state.photos[index].mesh.geometry.dispose();
                        state.photos.splice(index, 1);
                        state.grabRoundRemainingIds = state.grabRoundRemainingIds.filter(id => id !== removedId);
                        if (state.lastGrabbedPhotoId === removedId) state.lastGrabbedPhotoId = null;
                        updatePhotoVisibility();
                        renderPhotoGrid();
                    }
                });
            });
        };

        // ==========================================
        // 7. Music Player
        // ==========================================
        const audio = document.getElementById('bg-audio');
        const btnPlay = document.getElementById('btn-play-music');
        document.getElementById('upload-music').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                audio.play();
                btnPlay.style.display = 'inline-block';
                btnPlay.innerText = '暂停音乐 ⏸';

        });
        btnPlay.addEventListener('click', () => {
            if(audio.paused) { audio.play(); btnPlay.innerText = '暂停音乐 ⏸'; }
            else { audio.pause(); btnPlay.innerText = '播放音乐 ▶'; }
        });

        // ==========================================
        // 8. MediaPipe Hand Tracking (Gestures)
        // ==========================================
        const video = document.getElementById('cam-video');
        const camStatus = document.getElementById('cam-status');
        const camStatusDot = document.querySelector('#cam-preview-container .status-dot');
        let handLandmarker;
        let lastVideoTime = -1;
        let lastCamStatusText = '';
        let lastRawGesture = 'UNKNOWN';
        let stableGesture = 'UNKNOWN';
        let stableGestureFrames = 0;

        const setCamStatus = (text, color = '#ffd166') => {
            if (text !== lastCamStatusText) {
                camStatus.textContent = text;
                lastCamStatusText = text;
            }
            camStatus.style.color = color;
            camStatusDot.style.backgroundColor = color;
            camStatusDot.style.boxShadow = `0 0 8px ${color}`;
        };

        const createHandLandmarkerWithFallback = async (vision) => {
            const buildOptions = (delegate) => ({
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            try {
                return await HandLandmarker.createFromOptions(vision, buildOptions("GPU"));
            } catch (gpuErr) {
                console.warn("HandLandmarker GPU delegate failed, retrying with CPU:", gpuErr);
                return await HandLandmarker.createFromOptions(vision, buildOptions("CPU"));
            }
        };

        const getCameraErrorHint = (err) => {
            const name = err && err.name ? err.name : '';
            if (name === 'NotAllowedError') return '权限被拒绝';
            if (name === 'NotFoundError') return '未检测到摄像头';
            if (name === 'NotReadableError') return '摄像头被占用';
            if (name === 'OverconstrainedError') return '摄像头参数不兼容';
            if (name === 'SecurityError') return '浏览器安全策略拦截';
            if (name === 'AbortError') return '摄像头初始化中断';
            return '初始化失败';
        };

        const requestCameraStream = async () => {
            const preferredConstraints = {
                video: {
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            try {
                return await navigator.mediaDevices.getUserMedia(preferredConstraints);
            } catch (preferredErr) {
                console.warn('Preferred camera constraints failed, retrying basic constraints:', preferredErr);
                return await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            }
        };

        const initMediaPipe = async () => {
            try {
                await ensureVisionApisLoaded();
                if (!FilesetResolver || !HandLandmarker) {
                    throw new Error('MediaPipe vision bundle not loaded after fallback');
                }
                if (!window.isSecureContext) {
                    throw new Error('摄像头需要安全上下文，请通过 localhost 或 https 打开页面');
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('当前浏览器不支持 getUserMedia');
                }

                if (navigator.permissions && navigator.permissions.query) {
                    try {
                        const perm = await navigator.permissions.query({ name: 'camera' });
                        if (perm.state === 'denied') {
                            throw new Error('浏览器摄像头权限已被拒绝，请在地址栏恢复为允许');
                        }
                    } catch (permErr) {
                        // Ignore unsupported permission-query implementations.
                        if (permErr && permErr.message && permErr.message.includes('已被拒绝')) throw permErr;
                    }
                }

                setCamStatus('AI: 初始化模型...', '#ffd166');
                const vision = await resolveVisionFileset();
                handLandmarker = await createHandLandmarkerWithFallback(vision);

                setCamStatus('AI: 请求摄像头权限...', '#ffd166');
                const stream = await requestCameraStream();
                video.srcObject = stream;
                if (video.readyState < 1) {
                    await new Promise((resolve) => video.addEventListener('loadedmetadata', resolve, { once: true }));
                }
                await video.play().catch(() => {});

                setCamStatus('AI: 追踪就绪', '#55ff99');
                
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            } catch (err) {
                console.error("Camera/MediaPipe error:", err);
                const hint = getCameraErrorHint(err);
                setCamStatus(`AI: ${hint}`, '#ff5c5c');
                document.getElementById('loader-text').innerText = `摄像头接入失败(${hint}): ${err.message || '未知错误'}。请使用键盘控制 (Z/X/Space/方向键)`;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 4200);
            }
        };

        const calculateDistance = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2) + Math.pow(p1.z - p2.z, 2));

        const detectGesture = (landmarks) => {
            const wrist = landmarks[0];
            const indexMcp = landmarks[5];
            const middleMcp = landmarks[9];
            const ringMcp = landmarks[13];
            const pinkyMcp = landmarks[17];
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];

            const palmSize = Math.max(
                0.01,
                (calculateDistance(wrist, middleMcp) + calculateDistance(indexMcp, pinkyMcp)) / 2
            );

            // Focus (Pinch / OK) - index or multi-finger pinch are both accepted.
            const pinchIdx = calculateDistance(thumbTip, indexTip) / palmSize;
            const pinchMid = calculateDistance(thumbTip, middleTip) / palmSize;
            const pinchRing = calculateDistance(thumbTip, ringTip) / palmSize;
            const pinchAny = Math.min(pinchIdx, pinchMid, pinchRing);
            if (pinchAny < 0.34) return 'PINCH';

            // Finger extension relative to knuckles.
            const extIdx = calculateDistance(indexTip, indexMcp) / palmSize;
            const extMid = calculateDistance(middleTip, middleMcp) / palmSize;
            const extRing = calculateDistance(ringTip, ringMcp) / palmSize;
            const extPin = calculateDistance(pinkyTip, pinkyMcp) / palmSize;
            const avgExt = (extIdx + extMid + extRing + extPin) / 4;

            // Palm openness relative to wrist.
            const openIdx = calculateDistance(wrist, indexTip) / palmSize;
            const openMid = calculateDistance(wrist, middleTip) / palmSize;
            const openRing = calculateDistance(wrist, ringTip) / palmSize;
            const openPin = calculateDistance(wrist, pinkyTip) / palmSize;
            const avgOpen = (openIdx + openMid + openRing + openPin) / 4;

            // Reset gesture suggestion: thumbs-up (thumb extended, other fingers folded).
            const thumbExt = calculateDistance(thumbTip, wrist) / palmSize;
            if (thumbExt > 1.55 && extIdx < 0.95 && extMid < 0.95 && extRing < 0.95 && extPin < 0.95) {
                return 'RESET';
            }

            if (avgExt < 1.02 && avgOpen < 2.00) return 'FIST'; // TREE
            if (avgExt > 1.14 && avgOpen > 2.12) return 'OPEN'; // SCATTER
            
            return 'UNKNOWN';
        };

        const getStableGesture = (rawGesture) => {
            if (rawGesture === lastRawGesture) {
                stableGestureFrames += 1;
            } else {
                lastRawGesture = rawGesture;
                stableGestureFrames = 1;
            }

            // Require a few consistent frames before applying mode changes.
            if (stableGestureFrames >= 3) {
                stableGesture = rawGesture;
            }
            return stableGesture;
        };

        const updateHandRotationTarget = (landmarks) => {
            const rawX = landmarks[0].x - 0.5;
            const rawY = landmarks[0].y - 0.5;
            const deadZone = INTERACTION_CONFIG.handControlDeadZone;

            const normalizeWithDeadZone = (v) => {
                const av = Math.abs(v);
                if (av <= deadZone) return 0;
                return Math.sign(v) * ((av - deadZone) / (0.5 - deadZone));
            };

            const nx = normalizeWithDeadZone(rawX);
            const ny = normalizeWithDeadZone(rawY);
            const sx = Math.sign(nx) * Math.pow(Math.abs(nx), 1.35);
            const sy = Math.sign(ny) * Math.pow(Math.abs(ny), 1.35);
            const targetY = sx * state.rotationSpeed * INTERACTION_CONFIG.handControlGain;
            const targetX = sy * state.rotationSpeed * INTERACTION_CONFIG.handControlGain;

            state.handRotationTarget.y = THREE.MathUtils.clamp(
                targetY,
                -INTERACTION_CONFIG.handControlMax,
                INTERACTION_CONFIG.handControlMax
            );
            state.handRotationTarget.x = THREE.MathUtils.clamp(
                targetX,
                -INTERACTION_CONFIG.handControlMax,
                INTERACTION_CONFIG.handControlMax
            );
        };

        const getPinchStrength = (landmarks) => {
            const wrist = landmarks[0];
            const indexMcp = landmarks[5];
            const middleMcp = landmarks[9];
            const pinkyMcp = landmarks[17];
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];

            const palmSize = Math.max(
                0.01,
                (calculateDistance(wrist, middleMcp) + calculateDistance(indexMcp, pinkyMcp)) / 2
            );

            const pinchIdx = calculateDistance(thumbTip, indexTip) / palmSize;
            const pinchMid = calculateDistance(thumbTip, middleTip) / palmSize;
            const pinchRing = calculateDistance(thumbTip, ringTip) / palmSize;
            const pinchAny = Math.min(pinchIdx, pinchMid, pinchRing);

            return THREE.MathUtils.clamp((0.36 - pinchAny) / 0.18, 0, 1);
        };

        const placeFocusedPhoto = (normalizedX, normalizedY, pinchStrength, instant = false) => {
            if (!state.focusMesh) return;

            const baseSize = state.focusMesh.userData.focusBaseSize || new THREE.Vector3(6, 4, 0.2);
            const targetDistanceRaw = INTERACTION_CONFIG.photoFollowBaseDistance - pinchStrength * INTERACTION_CONFIG.photoFollowForwardRange;
            const targetDistance = THREE.MathUtils.clamp(
                targetDistanceRaw,
                INTERACTION_CONFIG.focusMinDistance,
                INTERACTION_CONFIG.focusMaxDistance
            );

            const fovRad = THREE.MathUtils.degToRad(camera.fov);
            const viewHalfHeight = Math.tan(fovRad * 0.5) * targetDistance;
            const viewHalfWidth = viewHalfHeight * camera.aspect;
            const safeRatio = 1 - INTERACTION_CONFIG.focusSafeMargin * 2;

            const maxScaleByHeight = (viewHalfHeight * 2 * safeRatio) / Math.max(baseSize.y, 0.1);
            const maxScaleByWidth = (viewHalfWidth * 2 * safeRatio) / Math.max(baseSize.x, 0.1);
            const targetScaleWanted = INTERACTION_CONFIG.photoFollowScaleBase + pinchStrength * INTERACTION_CONFIG.photoFollowScaleBoost;
            const targetScale = Math.min(
                targetScaleWanted,
                maxScaleByHeight,
                maxScaleByWidth,
                INTERACTION_CONFIG.photoFollowScaleMax
            );

            const halfPhotoW = Math.max(0.1, baseSize.x * targetScale * 0.5);
            const halfPhotoH = Math.max(0.1, baseSize.y * targetScale * 0.5);
            const safeHalfW = viewHalfWidth * (1 - INTERACTION_CONFIG.focusSafeMargin);
            const safeHalfH = viewHalfHeight * (1 - INTERACTION_CONFIG.focusSafeMargin);
            const maxOffsetX = Math.max(0, safeHalfW - halfPhotoW);
            const maxOffsetY = Math.max(0, safeHalfH - halfPhotoH);

            const desiredOffsetX = normalizedX * INTERACTION_CONFIG.photoFollowRangeX;
            const desiredOffsetY = normalizedY * INTERACTION_CONFIG.photoFollowRangeY;
            const clampedOffsetX = THREE.MathUtils.clamp(desiredOffsetX, -maxOffsetX, maxOffsetX);
            const clampedOffsetY = THREE.MathUtils.clamp(desiredOffsetY, -maxOffsetY, maxOffsetY);

            tempCamDir.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            tempCamRight.set(1, 0, 0).applyQuaternion(camera.quaternion).normalize();
            tempCamUp.set(0, 1, 0).applyQuaternion(camera.quaternion).normalize();

            const targetPos = camera.position.clone().add(tempCamDir.multiplyScalar(targetDistance));
            targetPos.add(tempCamRight.multiplyScalar(clampedOffsetX));
            targetPos.add(tempCamUp.multiplyScalar(clampedOffsetY));

            if (instant) {
                state.focusMesh.position.copy(targetPos);
                state.focusMesh.scale.set(targetScale, targetScale, targetScale);
            } else {
                state.focusMesh.position.lerp(targetPos, INTERACTION_CONFIG.photoFollowLerp);
                const scaleVec = new THREE.Vector3(targetScale, targetScale, targetScale);
                state.focusMesh.scale.lerp(scaleVec, INTERACTION_CONFIG.photoFollowLerp);
            }
            state.focusMesh.lookAt(camera.position);
        };

        const updateFocusedPhotoWithGesture = (landmarks) => {
            if (!state.focusMesh) return;

            const deadZone = INTERACTION_CONFIG.photoFollowDeadZone;
            const mapWithDeadZone = (v) => {
                const av = Math.abs(v);
                if (av <= deadZone) return 0;
                return Math.sign(v) * ((av - deadZone) / (0.5 - deadZone));
            };

            const handX = mapWithDeadZone(landmarks[0].x - 0.5);
            const handY = mapWithDeadZone(0.5 - landmarks[0].y);
            const pinchStrength = getPinchStrength(landmarks);
            const centerPull = pinchStrength * INTERACTION_CONFIG.photoFollowCenterPullMax;
            const followX = handX * (1 - centerPull);
            const followY = handY * (1 - centerPull);
            placeFocusedPhoto(followX, followY, pinchStrength, false);
        };

        // ==========================================
        // 9. Interaction Logic (Focus Photo)
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const tempWorldPos = new THREE.Vector3();
        const focusBoundsBox = new THREE.Box3();
        const focusBoundsSize = new THREE.Vector3();
        const tempCamDir = new THREE.Vector3();
        const tempCamRight = new THREE.Vector3();
        const tempCamUp = new THREE.Vector3();

        const updatePhotoVisibility = () => {
            state.photos.forEach((photo) => {
                const mesh = photo.mesh;
                if (!mesh) return;
                mesh.visible = !!state.focusMesh && mesh === state.focusMesh;
            });
        };

        const rebuildGrabRound = () => {
            const ids = state.photos.map(p => p.id);
            if (ids.length <= 1) {
                state.grabRoundRemainingIds = ids;
                return;
            }

            for (let i = ids.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [ids[i], ids[j]] = [ids[j], ids[i]];
            }

            if (state.lastGrabbedPhotoId && ids[0] === state.lastGrabbedPhotoId) {
                const swapIdx = 1 + Math.floor(Math.random() * (ids.length - 1));
                [ids[0], ids[swapIdx]] = [ids[swapIdx], ids[0]];
            }

            state.grabRoundRemainingIds = ids;
        };

        const syncGrabRound = () => {
            const currentIds = state.photos.map(p => p.id);
            const currentSet = new Set(currentIds);
            state.grabRoundRemainingIds = state.grabRoundRemainingIds.filter(id => currentSet.has(id));

            if (state.grabRoundRemainingIds.length === 0 && currentIds.length > 0) {
                rebuildGrabRound();
            }
        };

        const selectGrabCandidate = (consume = false) => {
            if (state.photos.length === 0) return null;

            const candidates = [];
            state.photos.forEach((photo) => {
                const mesh = photo.mesh;
                if (!mesh) return;
                mesh.getWorldPosition(tempWorldPos);
                const ndc = tempWorldPos.clone().project(camera);
                if (ndc.z < -1 || ndc.z > 1) return;
                const centerDist = Math.hypot(ndc.x, ndc.y);
                if (centerDist <= INTERACTION_CONFIG.pinchFallbackNdcRadius) {
                    candidates.push({ mesh, id: photo.id, centerDist });
                }
            });

            if (candidates.length === 0) return null;
            candidates.sort((a, b) => a.centerDist - b.centerDist);

            const preferred = candidates.filter(c => c.centerDist <= INTERACTION_CONFIG.centerGrabNdcRadius);
            const pool = preferred.length > 0 ? preferred : candidates;

            syncGrabRound();
            let picked = null;

            for (const id of state.grabRoundRemainingIds) {
                const found = pool.find(c => c.id === id);
                if (found) {
                    picked = found;
                    break;
                }
            }

            if (!picked) picked = pool.find(c => c.id !== state.lastGrabbedPhotoId) || pool[0];

            if (picked && picked.id === state.lastGrabbedPhotoId) {
                const alt = candidates.find(c => c.id !== state.lastGrabbedPhotoId);
                if (alt) picked = alt;
            }

            if (consume && picked) {
                state.grabRoundRemainingIds = state.grabRoundRemainingIds.filter(id => id !== picked.id);
                if (state.grabRoundRemainingIds.length === 0) rebuildGrabRound();
            }

            return picked ? picked.mesh : null;
        };

        const canGrabPhotoNow = () => (
            state.targetMode === 'SCATTER'
            && state.scatterReadiness >= INTERACTION_CONFIG.pinchEnableScatterThreshold
        );
        
        const grabPhoto = () => {
            if (!canGrabPhotoNow()) return;
            if (state.focusMesh || state.photos.length === 0) return;
            const targetMesh = selectGrabCandidate(true);
            if (!targetMesh) return;

            state.focusMesh = targetMesh;
            state.focusMesh.userData.isFocused = true;
            state.focusOriginalPos.copy(targetMesh.position);
            state.focusOriginalQuat.copy(targetMesh.quaternion);

            focusBoundsBox.setFromObject(targetMesh);
            focusBoundsBox.getSize(focusBoundsSize);
            if (focusBoundsSize.lengthSq() === 0) {
                focusBoundsSize.set(6, 4, 0.2);
            }
            targetMesh.userData.focusBaseSize = focusBoundsSize.clone();

            // Place focused photo safely inside camera view.
            placeFocusedPhoto(0, 0, 0, true);
            state.lastGrabbedPhotoId = targetMesh.userData?.id || null;
            updatePhotoVisibility();
        };

        const releasePhoto = () => {
            if (!state.focusMesh) return;
            state.focusMesh.userData.isFocused = false;
            state.focusMesh.scale.set(1, 1, 1);
            state.focusMesh = null;
            updatePhotoVisibility();
        };

        const performResetGesture = () => {
            state.targetMode = 'TREE';
            state.modeSwitchCooldown = 10;
            state.manualRotation.x = 0;
            state.manualRotation.y = 0;
            state.handRotation.x = 0;
            state.handRotation.y = 0;
            state.handRotationTarget.x = 0;
            state.handRotationTarget.y = 0;
            state.pinchReleaseCountdown = 0;
            if (state.isPinching || state.focusMesh) {
                state.isPinching = false;
                releasePhoto();
            }
            coreGroup.rotation.set(0, 0, 0);
        };

        // Keyboard Fallbacks
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.code === 'KeyF') {
                e.preventDefault();
                enterFullscreenAndHideUi();
                return;
            }
            if (e.code === 'Space') state.targetMode = 'TREE';
            if (e.code === 'KeyZ') state.targetMode = 'SCATTER';
            if (e.code === 'KeyR') performResetGesture();
            if (e.code === 'KeyX' && !state.isPinching) {
                if (!canGrabPhotoNow()) return;
                grabPhoto();
                state.isPinching = !!state.focusMesh;
                if (state.isPinching) state.pinchReleaseCountdown = INTERACTION_CONFIG.pinchReleaseGraceFrames;
            }
            if (e.code === 'ArrowLeft') state.manualRotation.y -= state.rotationSpeed;
            if (e.code === 'ArrowRight') state.manualRotation.y += state.rotationSpeed;
            if (e.code === 'ArrowUp') state.manualRotation.x -= state.rotationSpeed;
            if (e.code === 'ArrowDown') state.manualRotation.x += state.rotationSpeed;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyX') {
                state.isPinching = false;
                state.pinchReleaseCountdown = 0;
                releasePhoto();
            }
        });

        // ==========================================
        // 10. Animation Loop
        // ==========================================
        const clock = new THREE.Clock();

        const animate = () => {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const scatterTarget = state.targetMode === 'SCATTER' ? 1 : 0;
            const scatterLerp = THREE.MathUtils.clamp(delta * 2.0, 0, 1);
            state.scatterReadiness = THREE.MathUtils.lerp(state.scatterReadiness, scatterTarget, scatterLerp);

            // MediaPipe Logic
            if (handLandmarker && video.readyState >= 2) {
                let startTimeMs = performance.now();
                if (lastVideoTime !== video.currentTime) {
                    lastVideoTime = video.currentTime;
                    let results;
                    try {
                        results = handLandmarker.detectForVideo(video, startTimeMs);
                    } catch (trackErr) {
                        console.warn('Hand tracking frame failed:', trackErr);
                        setCamStatus('AI: 识别异常', '#ff9f43');
                        results = null;
                    }

                    if (results && results.landmarks && results.landmarks.length > 0) {
                        const landmarks = results.landmarks[0];
                        const rawGesture = detectGesture(landmarks);
                        const gesture = getStableGesture(rawGesture);
                        const pinchStartSignal = (rawGesture === 'PINCH' || gesture === 'PINCH');
                        const pinchHoldSignal = getPinchStrength(landmarks) > INTERACTION_CONFIG.pinchHoldStrengthMin;
                        const pinchSignal = state.isPinching ? (pinchStartSignal || pinchHoldSignal) : pinchStartSignal;
                        const fistReleaseSignal = state.isPinching && gesture === 'FIST' && !pinchStartSignal && !pinchHoldSignal;
                        const resetSignal = (gesture === 'RESET');

                        // Require several released frames before allowing another grab.
                        if (!pinchSignal) {
                            state.pinchReleaseFrames += 1;
                            if (state.pinchReleaseFrames >= INTERACTION_CONFIG.pinchRearmReleaseFrames) {
                                state.pinchReady = true;
                            }
                        } else {
                            state.pinchReleaseFrames = 0;
                        }

                        if (state.resetGestureCooldown > 0) state.resetGestureCooldown -= 1;
                        if (resetSignal && state.resetGestureCooldown === 0) {
                            performResetGesture();
                            state.resetGestureCooldown = 24;
                        }

                        // Robust mode switching: accept either raw or stable OPEN/FIST, with a short cooldown.
                        if (state.modeSwitchCooldown > 0) state.modeSwitchCooldown -= 1;
                        if (state.isPinching && fistReleaseSignal) {
                            state.isPinching = false;
                            state.pinchReleaseCountdown = 0;
                            releasePhoto();
                            state.targetMode = 'TREE';
                            state.modeSwitchCooldown = 6;
                        }
                        let nextMode = null;
                        if (rawGesture === 'OPEN' || gesture === 'OPEN') nextMode = 'SCATTER';
                        if (rawGesture === 'FIST' || gesture === 'FIST') nextMode = 'TREE';
                        if (!resetSignal && nextMode && nextMode !== state.targetMode && state.modeSwitchCooldown === 0 && !state.isPinching && !state.focusMesh) {
                            state.targetMode = nextMode;
                            state.modeSwitchCooldown = 6;
                            if (nextMode === 'TREE' && state.isPinching) {
                                state.isPinching = false;
                                state.pinchReleaseCountdown = 0;
                                releasePhoto();
                            }
                        }

                        const modeText = state.targetMode === 'SCATTER' ? '散开' : '聚合';
                        const scatterReady = state.scatterReadiness >= INTERACTION_CONFIG.pinchEnableScatterThreshold;
                        const spreadText = `发散${Math.round(state.scatterReadiness * 100)}%`;
                        const canGrab = canGrabPhotoNow() || state.isPinching;
                        const hasCenterPhoto = canGrab && !!selectGrabCandidate(false);
                        const centerText = !canGrab
                            ? (state.targetMode === 'SCATTER' && !scatterReady ? `${spreadText}，等待可捏合` : '聚合时不显示照片')
                            : (hasCenterPhoto ? '中心可抓取' : '等待照片到中心');
                        if (resetSignal) setCamStatus(`AI: RESET | 模式:${modeText} | 已恢复`, '#8ed8ff');
                        else if (rawGesture === 'UNKNOWN') setCamStatus(`AI: 检测到手 | 模式:${modeText} | ${centerText}`, '#55ff99');
                        else setCamStatus(`AI: ${rawGesture} | 模式:${modeText} | ${centerText}`, '#55ff99');

                        if (state.targetMode === 'SCATTER') updateHandRotationTarget(landmarks);
                        else {
                            state.handRotationTarget.x = 0;
                            state.handRotationTarget.y = 0;
                        }

                        if (canGrab && pinchSignal) {
                            if(!state.isPinching && state.pinchReady) {
                                grabPhoto();
                                state.isPinching = !!state.focusMesh;
                                if (state.isPinching) {
                                    state.pinchReady = false;
                                    state.pinchReleaseFrames = 0;
                                }
                            }
                            if (state.isPinching && state.focusMesh) {
                                state.pinchReleaseCountdown = INTERACTION_CONFIG.pinchReleaseGraceFrames;
                                updateFocusedPhotoWithGesture(landmarks);
                            }
                        } else {
                            if (state.isPinching) {
                                state.pinchReleaseCountdown -= 1;
                                if (state.pinchReleaseCountdown <= 0) {
                                    state.isPinching = false;
                                    releasePhoto();
                                }
                            }
                        }
                    } else {
                        setCamStatus('AI: 未检测到手', '#ffd166');
                        lastRawGesture = 'UNKNOWN';
                        stableGesture = 'UNKNOWN';
                        stableGestureFrames = 0;
                        state.handRotationTarget.x = 0;
                        state.handRotationTarget.y = 0;
                        state.pinchReleaseCountdown = 0;
                        state.pinchReady = true;
                        state.pinchReleaseFrames = 0;
                        if (state.isPinching) { state.isPinching = false; releasePhoto(); }
                    }
                }
            }

            // Interpolate Mode
            state.mode = state.targetMode;

            // Update Particles
            const dummy = new THREE.Object3D();
            const lerpFactor = delta * 2.0;

            particlesData.forEach((data) => {
                const target = state.mode === 'TREE' ? data.treePos : data.scatterPos;
                data.currentPos.lerp(target, lerpFactor);
                
                dummy.position.copy(data.currentPos);
                // Subtle rotation animation
                dummy.rotation.x += delta * 0.5;
                dummy.rotation.y += delta * 0.5;
                dummy.updateMatrix();
                instancedMeshes[data.meshIndex].setMatrixAt(data.instanceId, dummy.matrix);
            });
            instancedMeshes.forEach(m => m.instanceMatrix.needsUpdate = true);

            // Update Photos
            state.photos.forEach(p => {
                if (p.mesh.userData.isFocused) return; // Skip if focused
                const target = state.mode === 'TREE' ? p.mesh.userData.treePos : p.mesh.userData.scatterPos;
                p.mesh.userData.currentPos.lerp(target, lerpFactor);
                p.mesh.position.copy(p.mesh.userData.currentPos);
                p.mesh.lookAt(camera.position); // Always face camera
            });

            // Rotate Core Group
            const autoSpinY = state.mode === 'SCATTER' ? INTERACTION_CONFIG.scatterAutoSpinY : INTERACTION_CONFIG.treeAutoSpinY;
            const autoSpinX = state.mode === 'SCATTER' ? INTERACTION_CONFIG.scatterAutoSpinX : 0;
            const autoSpinZ = state.mode === 'SCATTER' ? INTERACTION_CONFIG.scatterAutoSpinZ : 0;

            const handTargetX = state.mode === 'SCATTER' ? state.handRotationTarget.x : 0;
            const handTargetY = state.mode === 'SCATTER' ? state.handRotationTarget.y : 0;
            const handSmooth = state.mode === 'SCATTER' ? INTERACTION_CONFIG.handControlSmoothing : 0.08;
            state.handRotation.x = THREE.MathUtils.lerp(state.handRotation.x, handTargetX, handSmooth);
            state.handRotation.y = THREE.MathUtils.lerp(state.handRotation.y, handTargetY, handSmooth);

            coreGroup.rotation.y += autoSpinY + state.manualRotation.y + state.handRotation.y;
            coreGroup.rotation.x += autoSpinX + state.manualRotation.x + state.handRotation.x;
            coreGroup.rotation.z += autoSpinZ;
            state.manualRotation.x *= state.mode === 'SCATTER' ? 0.90 : 0.95; // Dampening
            state.manualRotation.y *= state.mode === 'SCATTER' ? 0.90 : 0.95;

            // Rotate Dust System Slowly
            dustSystem.rotation.y -= delta * (state.mode === 'SCATTER' ? 0.22 : 0.05);
            dustSystem.rotation.x += delta * (state.mode === 'SCATTER' ? 0.04 : 0);

            composer.render();
        };

        // Initialize Application
        (async () => {
            try {
                await initDB();
                const savedPhotos = await loadPhotosFromDB();
                savedPhotos.forEach(p => createPhotoMesh(p.dataUrl, p.id));
            } catch(e) { console.warn("Local storage init failed:", e); }
            
            await initMediaPipe();
            animate();
        })();

    </script>
</body>
</html>
